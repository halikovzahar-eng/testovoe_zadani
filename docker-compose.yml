version: '3.8'

services:
  backend:
    build: ./backend
    container_name: web-backend
    restart: unless-stopped
    expose:
      - "8080"
    networks:
      - app-network

  nginx:
    image: nginx:1.26-alpine
    container_name: revers_proxy-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
    - ./nginx/nginx.conf/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
    name: docker-network